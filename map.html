<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国民养老 · 新人航行计划</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue-50:#EEF4FF;--blue-100:#D9E6FF;--blue-200:#B8D0FF;--blue-300:#8BB4FF;--blue-400:#5E8FEE;--blue-500:#4A7BE0;--blue-600:#3A62C0;
  --purple-50:#F3EEFF;--purple-100:#E4D9FF;--purple-200:#CBB8FF;--purple-300:#A98EF5;--purple-400:#8B6FE0;
  --rose-50:#FFF0F1;--rose-100:#FFDDE0;--rose-200:#FFBCC2;--rose-300:#FF8F99;--rose-400:#E8636E;
  --emerald-50:#EDFCF5;--emerald-100:#D0F5E3;--emerald-200:#A5EBCC;--emerald-300:#6DD8AD;--emerald-400:#4BBF92;
  --amber-50:#FFF9EB;--amber-100:#FFEDC5;--amber-200:#FFD98A;--amber-300:#FFC04D;--amber-400:#F5A623;
  --slate-50:#F8FAFC;--slate-100:#F1F5F9;--slate-200:#E2E8F0;--slate-300:#CBD5E1;--slate-400:#94A3B8;--slate-500:#64748B;--slate-600:#475569;--slate-700:#334155;--slate-800:#1E293B;--slate-900:#0F172A;
  --white:#FFFFFF;
  --radius:16px;--radius-lg:24px;--radius-xl:32px;
  --shadow-sm:0 2px 8px rgba(47,71,110,0.06);
  --shadow-md:0 4px 16px rgba(47,71,110,0.08);
  --shadow-lg:0 8px 32px rgba(47,71,110,0.12);
  --shadow-xl:0 16px 48px rgba(47,71,110,0.16);
  --font:'Noto Sans SC',-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
body{font-family:var(--font);background:linear-gradient(160deg,#EEF4FF 0%,#F3EEFF 40%,#FFF0F1 70%,#FFF9EB 100%);color:var(--slate-800);overflow-x:hidden;min-height:100vh;}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}50%{transform:translateY(-10px)}70%{transform:translateY(-15px)}}
@keyframes bannerFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* ===== TOP NAV ===== */
.top-nav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(250,248,245,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--slate-200);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100;}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-logo{height:60px;width:auto;object-fit:contain;flex-shrink:0;margin:-4px 0;}
.nav-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue-400),var(--purple-400));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:var(--transition);position:relative;}
.nav-avatar:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(74,123,224,0.25);}
.nav-name{font-weight:600;font-size:15px;color:var(--slate-700);}
.nav-left{position:relative;}

/* Avatar dropdown */
.avatar-dropdown{position:absolute;top:56px;left:0;z-index:150;background:var(--white);border-radius:var(--radius);padding:6px;min-width:180px;box-shadow:var(--shadow-xl);border:1px solid var(--slate-200);display:none;animation:slideUp 0.2s ease;}
.avatar-dropdown.active{display:block;}
.avatar-dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--slate-600);transition:var(--transition);font-weight:500;}
.avatar-dropdown-item:hover{background:var(--blue-50);color:var(--blue-500);}
.avatar-dropdown-item.danger{color:var(--rose-400);}
.avatar-dropdown-item.danger:hover{background:var(--rose-50);color:var(--rose-400);}
.avatar-dropdown-item .item-icon{font-size:16px;width:22px;text-align:center;}
.avatar-dropdown-divider{height:1px;background:var(--slate-100);margin:4px 8px;}
.nav-center{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--amber-50),var(--amber-100));padding:8px 20px;border-radius:40px;border:2px solid var(--amber-200);}
.bean-icon{font-size:22px;animation:bounce 2s infinite;}
.bean-count{font-weight:700;font-size:18px;color:var(--amber-400);}
.nav-right{display:flex;gap:8px;}
.nav-btn{padding:8px 16px;border-radius:12px;border:1.5px solid var(--slate-200);background:var(--white);cursor:pointer;font-size:14px;font-weight:500;color:var(--slate-600);transition:var(--transition);display:flex;align-items:center;gap:6px;}
.nav-btn:hover{border-color:var(--blue-300);color:var(--blue-500);background:var(--blue-50);}

/* ===== UNIFIED MAP HOME ===== */
#mapPage{padding-top:64px;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}

/* Header overlay */
.home-header-overlay{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:30;text-align:center;width:90%;max-width:600px;pointer-events:none;}
.home-title{font-size:30px;font-weight:900;background:linear-gradient(135deg,var(--blue-500),var(--purple-400),var(--rose-400));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:2px;}
.home-subtitle{font-size:14px;color:var(--slate-500);font-weight:400;letter-spacing:1px;}

/* Map container */
.map-home-container{position:relative;flex:1;width:100%;max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:center;}
.map-home-bg{position:absolute;width:70%;max-width:880px;height:auto;object-fit:contain;z-index:1;filter:drop-shadow(0 6px 28px rgba(74,123,224,0.10));pointer-events:none;}

/* Institution banners — PNG images on map */
.home-institution-banner{position:absolute;z-index:10;cursor:pointer;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);border-radius:14px;overflow:hidden;border:3px solid rgba(255,255,255,0.95);box-shadow:0 6px 24px rgba(47,71,110,0.18);background:#fff;animation:bannerFloat 3.2s ease-in-out infinite;}
.home-institution-banner:nth-child(odd){animation-delay:-1.6s;}
.home-institution-banner:hover{animation-play-state:paused;transform:translateY(-10px) scale(1.07);box-shadow:0 16px 40px rgba(74,123,224,0.28);border-color:var(--blue-300);z-index:20;}
.home-institution-banner:active{transform:translateY(-4px) scale(1.02);}
.home-institution-banner img{width:100%;height:auto;display:block;border-radius:11px;}
.home-inst-label{display:block;padding:5px 6px 2px;color:var(--slate-700);font-size:12px;font-weight:700;text-align:center;letter-spacing:1px;background:transparent;}
.home-inst-glow{position:absolute;inset:-6px;border-radius:20px;background:linear-gradient(135deg,var(--blue-400),var(--purple-400));opacity:0;transition:opacity 0.3s ease;z-index:-1;filter:blur(12px);}
.home-institution-banner:hover .home-inst-glow{opacity:0.5;}

/* Banner geographic positions */
.home-inst-beijing{width:170px;top:10%;left:60%;}
.home-inst-shandong{width:165px;top:22%;left:66%;}
.home-inst-shanghai{width:170px;top:43%;left:76%;}
.home-inst-zhejiang{width:165px;top:52%;left:74%;}
.home-inst-guangdong{width:170px;top:70%;left:64%;}
.home-inst-sichuan{width:170px;top:50%;left:35%;}
.home-inst-chongqing{width:165px;top:47%;left:47%;}

/* Footer hint */
.home-footer-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:30;text-align:center;}
.home-hint-text{font-size:12px;color:var(--slate-400);background:rgba(255,255,255,0.7);backdrop-filter:blur(8px);padding:6px 20px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;}
.home-hint-text span{animation:bounce 2s infinite;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.3);backdrop-filter:blur(8px);z-index:400;display:none;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--white);border-radius:var(--radius-xl);padding:36px;max-width:420px;width:90%;text-align:center;box-shadow:var(--shadow-xl);animation:slideUp 0.4s ease;}
.modal-icon{font-size:48px;margin-bottom:16px;}
.modal h3{font-size:20px;font-weight:700;color:var(--slate-800);margin-bottom:8px;}
.modal p{font-size:14px;color:var(--slate-500);line-height:1.6;margin-bottom:24px;}
.modal-btns{display:flex;gap:12px;justify-content:center;}
.modal-btn{padding:12px 28px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:var(--transition);font-family:var(--font);}
.modal-btn-primary{background:linear-gradient(135deg,var(--blue-400),var(--blue-500));color:#fff;}
.modal-btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(74,123,224,0.3);}
.modal-btn-secondary{background:var(--slate-100);color:var(--slate-600);}
.modal-btn-secondary:hover{background:var(--slate-200);}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){
  .home-institution-banner{width:140px !important;}
  .home-inst-beijing{top:18%;left:58%;}
  .home-inst-shandong{top:28%;left:64%;}
  .home-inst-shanghai{top:46%;left:74%;}
  .home-inst-zhejiang{top:54%;left:72%;}
  .home-inst-guangdong{top:70%;left:62%;}
  .home-inst-sichuan{top:50%;left:34%;}
  .home-inst-chongqing{top:47%;left:46%;}
  .home-title{font-size:26px;}
  .home-inst-label{font-size:10px;}
}
@media(max-width:768px){
  .home-title{font-size:20px;}
  .home-subtitle{font-size:12px;}
  .home-header-overlay{top:72px;}
  .map-home-container{transform:scale(0.75);transform-origin:center top;}
  .home-institution-banner{width:100px !important;border-radius:10px;border-width:2px;}
  .home-institution-banner img{border-radius:8px;}
  .home-inst-label{font-size:9px;padding:4px 3px 1px;}
  .home-footer-hint{bottom:4px;}
  .home-hint-text{font-size:10px;padding:6px 14px;}
}
</style>
</head>
<body>

<div id="mapPage">
  <!-- Top Nav -->
  <nav class="top-nav">
    <div class="nav-left">
      <img src="../国民logo.png" alt="国民养老保险" class="nav-logo">
      <div class="nav-avatar" onclick="toggleAvatarMenu(event)">👥</div>
      <span class="nav-name">新航员</span>
      <div class="avatar-dropdown" id="avatarDropdown">
        <div class="avatar-dropdown-item" onclick="showPointsDetail();closeAvatarMenu();">
          <span class="item-icon">📊</span>积分明细
        </div>
        <div class="avatar-dropdown-divider"></div>
        <div class="avatar-dropdown-item danger" id="resetIdentityBtn" onclick="confirmResetIdentity();closeAvatarMenu();">
          <span class="item-icon">🔄</span>切换身份（重置进度）
        </div>
      </div>
    </div>
    <div class="nav-center">
      <span class="bean-icon">🫘</span>
      <span class="bean-count" id="navBeanCount">0</span>
      <span style="font-size:13px;color:var(--amber-400);font-weight:500;">国小豆</span>
    </div>
    <div class="nav-right">
      <button class="nav-btn" onclick="goToShop()">🎁 兑换商城</button>
    </div>
  </nav>

  <!-- Header -->
  <div class="home-header-overlay">
    <h1 class="home-title">国民养老 · 新人航行计划</h1>
    <p class="home-subtitle">点击机构入口，开启你的知识海洋之旅</p>
  </div>

  <!-- China Map with Institution Banners -->
  <div class="map-home-container">
    <img src="中国地图.png" alt="中国地图" class="map-home-bg">

    <!-- 北京(总部) — 华北 -->
    <div class="home-institution-banner home-inst-beijing" onclick="enterInst('beijing')">
      <div class="home-inst-glow"></div>
      <img src="北京.png" alt="北京(总部)">
      <div class="home-inst-label">🏛️ 北京(总部)</div>
    </div>

    <!-- 山东 — 华东 -->
    <div class="home-institution-banner home-inst-shandong" onclick="enterInst('shandong')">
      <div class="home-inst-glow"></div>
      <img src="山东.png" alt="山东">
      <div class="home-inst-label">⛰️ 山东</div>
    </div>

    <!-- 上海 — 东部沿海 -->
    <div class="home-institution-banner home-inst-shanghai" onclick="enterInst('shanghai')">
      <div class="home-inst-glow"></div>
      <img src="上海.png" alt="上海">
      <div class="home-inst-label">🏙️ 上海</div>
    </div>

    <!-- 浙江 — 东南沿海 -->
    <div class="home-institution-banner home-inst-zhejiang" onclick="enterInst('zhejiang')">
      <div class="home-inst-glow"></div>
      <img src="浙江.png" alt="浙江">
      <div class="home-inst-label">🌊 浙江</div>
    </div>

    <!-- 广东(广州) — 华南 -->
    <div class="home-institution-banner home-inst-guangdong" onclick="enterInst('guangdong')">
      <div class="home-inst-glow"></div>
      <img src="广州.png" alt="广东">
      <div class="home-inst-label">🌴 广东</div>
    </div>

    <!-- 四川(成都) — 西南 -->
    <div class="home-institution-banner home-inst-sichuan" onclick="enterInst('sichuan')">
      <div class="home-inst-glow"></div>
      <img src="四川.png" alt="四川">
      <div class="home-inst-label">🐼 四川</div>
    </div>

    <!-- 重庆 — 西南 -->
    <div class="home-institution-banner home-inst-chongqing" onclick="enterInst('chongqing')">
      <div class="home-inst-glow"></div>
      <img src="重庆.png" alt="重庆">
      <div class="home-inst-label">🌆 重庆</div>
    </div>
  </div>

  <!-- Footer Hint -->
  <div class="home-footer-hint">
    <div class="home-hint-text"><span>👆</span> 点击机构卡片开始学习</div>
  </div>
</div>

<!-- Points Detail Modal -->
<div class="modal-overlay" id="pointsModal">
  <div class="modal">
    <div class="modal-icon">📊</div>
    <h3>国小豆积分明细</h3>
    <p id="pointsDetailText">暂无积分记录</p>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-primary" onclick="closeModal('pointsModal')">确定</button>
    </div>
  </div>
</div>

<!-- Reset Identity Modal -->
<div class="modal-overlay" id="resetIdentityModal">
  <div class="modal">
    <div class="modal-icon">🔄</div>
    <h3>确认切换身份？</h3>
    <p id="resetIdentityText">切换为新员工身份后，所有学习进度、国小豆积分、兑换记录将被清空，此操作不可撤销。</p>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" onclick="closeModal('resetIdentityModal')">取消</button>
      <button class="modal-btn modal-btn-primary" style="background:linear-gradient(135deg,var(--rose-400),var(--rose-300));" onclick="executeResetIdentity()">确认切换</button>
    </div>
  </div>
</div>

<script>
// ==================== SHARED STATE (same localStorage key as index.html) ====================
const DEFAULT_STATE = {
  points: 0,
  pointsHistory: [],
  visitedInstitutions: [],
  completedInstitutions: [],
  documentsRead: {},
  quizScore: 0,
  quizCompleted: false,
  hurricaneTriggered: false,
  hurricaneCompleted: false,
  mandatoryDocs: { '企业文化理念体系': false, 'HR系统须知': false },
  currentInstitution: null,
  shopExchanges: [],
  currentScreen: 'startScreen',
  previousScreen: 'startScreen',
  guideCompleted: false,
  firstVisitInstitutions: {},
};

const INSTITUTIONS = {
  beijing:   { name: '北京总部 — 永定河', icon: '💧', color: '#4AADE0' },
  shanghai:  { name: '上海 — 黄浦江', icon: '💧', color: '#4AADE0' },
  shandong:  { name: '山东 — 趵突泉', icon: '💧', color: '#4AADE0' },
  sichuan:   { name: '四川 — 都江堰', icon: '💧', color: '#4AADE0' },
  guangdong: { name: '广东 — 珠江', icon: '💧', color: '#4AADE0' },
  chongqing: { name: '重庆 — 嘉陵江', icon: '💧', color: '#4AADE0' },
  zhejiang:  { name: '浙江 — 西湖', icon: '💧', color: '#4AADE0' },
};

// Document data (for progress calculation, must match index.html)
const ISLANDS = {
  about: {
    name: '企业文化', icon: '🏢', color: '#4A90E2',
    docs: [
      { id: '企业文化理念体系', title: '企业文化理念体系', file: '企业文化理念体系.mp4', type: 'video', mandatory: true, points: 10 },
      { id: '品牌手册', title: '品牌手册', file: '品牌手册.mp4', type: 'video', points: 5 },
      { id: '公司经营动态', title: '公司经营动态', file: '公司经营动态.mp4', type: 'video', points: 5 },
    ]
  },
  onboarding: {
    name: '入职须知', icon: '📋', color: '#F0A623',
    docs: [
      { id: 'HR系统须知', title: 'HR系统须知', file: '入职指引.mp4', type: 'video', mandatory: true, points: 10 },
      { id: '财务报销须知', title: '财务报销须知', file: 'scripts/finicialsystem.mp4', type: 'video', points: 5 },
    ]
  },
  office: {
    name: '办公指南', icon: '💻', color: '#00B894',
    docs: [
      { id: 'IT设备操作指南', title: '办公职场IT设备操作指南', file: '办公职场IT设备操作指南.mp4', type: 'video', points: 5 },
      { id: '网络操作指南', title: '网络操作指南', file: '网络操作指南.mp4', type: 'video', points: 5 },
      { id: '差旅指南', title: '差旅指南', file: '差旅指南.mp4', type: 'video', points: 5 },
      { id: '财务指南', title: '财务指南', file: '财务指南.mp4', type: 'video', points: 5 },
      { id: 'OA指南', title: 'OA指南', file: 'OA指南.mp4', type: 'video', points: 5 },
      { id: 'HR指南', title: 'HR指南', file: 'HR指南.mp4', type: 'video', points: 5 },
    ]
  },
  products: {
    name: '公司产品', icon: '📦', color: '#7C6FE0',
    docs: [
      { id: '国民养老产品体系', title: '国民养老产品体系', file: '国民养老产品体系.mp4', type: 'video', points: 5 },
      { id: '商业养老金产品介绍', title: '商业养老金产品介绍', file: '商业养老金产品介绍.mp4', type: 'video', points: 5 },
      { id: '个人养老金法规政策汇编', title: '个人养老金法规政策汇编', file: '个人养老金法规政策汇编.mp4', type: 'video', points: 5 },
    ]
  },
};

const TOTAL_DOCS = Object.values(ISLANDS).reduce((sum, island) => sum + island.docs.length, 0);

let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem('guomin_navigate_state');
    if (saved) { state = { ...DEFAULT_STATE, ...JSON.parse(saved) }; }
    else { state = { ...DEFAULT_STATE }; }
  } catch(e) { state = { ...DEFAULT_STATE }; }
}

function saveState() {
  try { localStorage.setItem('guomin_navigate_state', JSON.stringify(state)); } catch(e) {}
}

// ==================== NAVIGATION ====================
function enterInst(instKey) {
  // Save current state before navigating
  saveState();
  // Navigate to index.html with the institution key
  window.location.href = 'index.html?inst=' + instKey;
}

function goToShop() {
  saveState();
  window.location.href = 'index.html?screen=shop';
}

// ==================== AVATAR DROPDOWN ====================
function toggleAvatarMenu(e) {
  e.stopPropagation();
  var dd = document.getElementById('avatarDropdown');
  dd.classList.toggle('active');
  updateResetBtn();
}

function closeAvatarMenu() {
  document.getElementById('avatarDropdown').classList.remove('active');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-left')) {
    closeAvatarMenu();
  }
});

// ==================== BEAN COUNT ====================
function updateBeanCount() {
  document.getElementById('navBeanCount').textContent = state.points;
}

// ==================== POINTS DETAIL ====================
function showPointsDetail() {
  var text = state.pointsHistory.length > 0
    ? state.pointsHistory.slice(0, 15).map(function(h) {
        return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--slate-100);font-size:13px;"><span style="color:var(--slate-500);">' + h.reason + '</span><span style="font-weight:600;color:' + (h.amount>0?'var(--amber-400)':'var(--rose-400)') + ';">' + (h.amount>0?'+':'') + h.amount + '</span></div>';
      }).join('')
    : '暂无积分记录';
  document.getElementById('pointsDetailText').innerHTML = '<div style="text-align:right;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--amber-400);">总计: ' + state.points + ' 国小豆</div>' + text;
  document.getElementById('pointsModal').classList.add('active');
}

// ==================== RESET IDENTITY ====================
function updateResetBtn() {
  var btn = document.getElementById('resetIdentityBtn');
  if (state.points === 0) {
    btn.style.opacity = '0.4';
    btn.style.pointerEvents = 'none';
    btn.title = '当前已是新员工身份';
  } else {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
    btn.title = '';
  }
}

function confirmResetIdentity() {
  if (state.points === 0) return;
  var text = '当前积分：' + state.points + ' 国小豆\n已完成文档：' + Object.values(state.documentsRead).filter(function(v){return v;}).length + '/' + TOTAL_DOCS + '\n\n切换为新员工身份后，所有学习进度、国小豆积分、兑换记录将被清空，此操作不可撤销。';
  document.getElementById('resetIdentityText').textContent = text;
  document.getElementById('resetIdentityModal').classList.add('active');
}

function executeResetIdentity() {
  state = { ...DEFAULT_STATE };
  saveState();
  closeModal('resetIdentityModal');
  updateBeanCount();
  setTimeout(function() {
    alert('✅ 身份切换成功！已切换为新员工，学习进度已全部清空。');
  }, 300);
}

// ==================== MODAL ====================
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

// ==================== INIT ====================
function init() {
  loadState();
  updateBeanCount();
}

init();
</script>
</body>
</html>
