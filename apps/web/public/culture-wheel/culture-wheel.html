<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>企业文化知识转盘</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif;background:#fff8f5;color:#231815;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow-x:hidden;line-height:1.5}

body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 14% 18%,rgba(231,0,18,.13),transparent 30%),radial-gradient(circle at 88% 12%,rgba(255,195,80,.18),transparent 28%),linear-gradient(160deg,#fffdfb 0%,#fff3ee 52%,#f9f6f2 100%);pointer-events:none;z-index:0}

.brand-logo{position:fixed;top:22px;left:26px;z-index:30;width:min(270px,34vw);height:auto;filter:drop-shadow(0 8px 18px rgba(35,24,21,.10))}
.page-shell{width:min(1040px,100%);padding:52px 24px 28px;position:relative;z-index:1}
.page-header{text-align:center;padding:0 16px 20px}
.page-header h1{font-size:clamp(25px,4.5vw,42px);font-weight:900;color:#231815;letter-spacing:2px}
.page-header .subtitle{margin:8px auto 0;font-size:clamp(14px,2vw,17px);color:#6c5550;font-weight:700;letter-spacing:.5px}

.wheel-section{display:grid;grid-template-columns:minmax(320px,440px) minmax(280px,360px);gap:28px;align-items:center;justify-content:center}
.wheel-outer{position:relative;width:min(430px,88vw);height:min(430px,88vw);margin:0 auto}
.wheel-pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);z-index:20;width:46px;height:46px;background:#fff;border:3px solid #e70012;border-radius:50%;box-shadow:0 8px 18px rgba(35,24,21,.18);display:flex;align-items:center;justify-content:center}
.wheel-pointer::after{content:"";width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:22px solid #e70012;transform:translateY(17px);filter:drop-shadow(0 2px 2px rgba(120,0,8,.18))}
.wheel-rotator{width:100%;height:100%;border-radius:50%;box-shadow:0 18px 46px rgba(35,24,21,.16),0 0 0 7px #fff,0 0 0 12px rgba(231,0,18,.13);overflow:hidden;position:relative;background:#fff;will-change:transform}
.wheel-rotator svg{width:100%;height:100%;display:block}
.btn-spin-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15}
.btn-spin{width:92px;height:92px;border-radius:50%;background:linear-gradient(135deg,#e70012,#8a1717);color:#fff;font-size:16px;font-weight:900;letter-spacing:1px;border:6px solid #fff;cursor:pointer;box-shadow:0 10px 22px rgba(231,0,18,.26);transition:transform .15s,box-shadow .15s,background .2s;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.25;user-select:none}
.btn-spin:hover:not(:disabled){background:linear-gradient(135deg,#ff1e28,#b10f18);transform:scale(1.05);box-shadow:0 14px 28px rgba(231,0,18,.30)}
.btn-spin:active:not(:disabled){transform:scale(.97)}
.btn-spin:disabled{background:#a8b4c5;cursor:not-allowed;box-shadow:none;color:#eef3f8}

.status-panel{background:rgba(255,255,255,.9);border:1px solid rgba(231,0,18,.16);border-radius:8px;box-shadow:0 16px 40px rgba(35,24,21,.10);padding:20px}
.status-top{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:14px}
.status-label{display:block;font-size:13px;color:#7a6059;font-weight:800;letter-spacing:.5px}
.status-value{display:block;font-size:32px;line-height:1;font-weight:900;color:#e70012;margin-top:6px}
.status-count{font-size:14px;font-weight:800;color:#5c4742;background:#fff1ed;border-radius:8px;padding:8px 10px;white-space:nowrap}
.progress-track{height:12px;background:#f1dfd9;border-radius:999px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#e70012,#f6b73c);border-radius:inherit;transition:width .35s ease}
.progress-dots{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
.progress-dot{height:12px;border-radius:999px;background:#eadbd6;box-shadow:inset 0 0 0 1px rgba(92,71,66,.12);transition:background .25s ease,transform .25s ease}
.progress-dot.active{background:#e70012;transform:translateY(-1px)}
.status-message{font-size:15px;color:#4d3d39;font-weight:700;line-height:1.65;margin-bottom:16px;min-height:48px}
.lit-list{display:flex;flex-wrap:wrap;gap:8px}
.lit-chip{font-size:13px;font-weight:800;color:#7a6059;background:#fff4f0;border:1px solid #eadbd6;border-radius:999px;padding:6px 10px}
.lit-chip.active{color:#fff;background:#e70012;border-color:#e70012}

.mascot{position:fixed;right:22px;bottom:10px;z-index:25;width:min(500px,46vw);pointer-events:none;transform-origin:50% 82%;filter:drop-shadow(0 18px 28px rgba(35,24,21,.22))}
.mascot img{display:block;width:100%;height:auto}
.mascot::before{content:"";position:absolute;left:18%;top:0;width:58%;height:42%;border-radius:50%;background:radial-gradient(circle,rgba(255,228,92,.95) 0%,rgba(255,190,37,.54) 36%,rgba(255,211,89,0) 72%);opacity:0;transform:scale(.7);mix-blend-mode:screen;pointer-events:none}
.mascot::after{content:"";position:absolute;left:18%;top:-2%;width:58%;height:45%;border-radius:50%;border:2px solid rgba(255,205,51,.0);opacity:0;pointer-events:none}
.mascot.shine{animation:mascotBounce 1.15s ease both}
.mascot.shine::before{animation:headGlow 1.15s ease both}
.mascot.shine::after{animation:goldRing 1.15s ease both}
@keyframes mascotBounce{0%,100%{transform:translateY(0) scale(1)}35%{transform:translateY(-8px) scale(1.025)}}
@keyframes headGlow{0%{opacity:0;transform:scale(.55)}22%{opacity:1;transform:scale(1.05)}58%{opacity:.92;transform:scale(1.2)}100%{opacity:0;transform:scale(1.45)}}
@keyframes goldRing{0%{opacity:0;border-color:rgba(255,205,51,.0);transform:scale(.75)}30%{opacity:1;border-color:rgba(255,205,51,.9);transform:scale(1.08)}100%{opacity:0;border-color:rgba(255,205,51,0);transform:scale(1.55)}}

.modal-mask{display:none;position:fixed;inset:0;background:rgba(15,23,42,.52);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-mask.active{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:34px 32px 28px;max-width:560px;width:100%;box-shadow:0 24px 70px rgba(15,23,42,.28);animation:modalIn .28s cubic-bezier(.34,1.56,.64,1);text-align:center}
@keyframes modalIn{from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1}}
.modal-badge{display:inline-block;background:#e70012;color:#fff;font-size:13px;font-weight:900;padding:5px 16px;border-radius:999px;letter-spacing:1px;margin-bottom:14px}
.modal-title{font-size:clamp(21px,3.5vw,28px);font-weight:900;color:#14213d;line-height:1.45;margin-bottom:14px}
.modal-divider{width:56px;height:4px;background:linear-gradient(90deg,#e70012,#f6b73c);border-radius:2px;margin:0 auto 18px}
.modal-desc{font-size:clamp(16px,2.3vw,18px);color:#3b302d;line-height:1.9;text-align:left;background:#fff7f4;border-radius:8px;padding:18px 20px;border-left:5px solid #e70012}
.modal-tip{margin-top:14px;font-size:13px;color:#53657f;font-weight:800}
.modal-btns{display:flex;gap:14px;margin-top:24px;justify-content:center}
.modal-btns button{flex:1;max-width:170px;padding:12px 0;border-radius:999px;font-size:16px;font-weight:900;cursor:pointer;border:none;transition:transform .15s,box-shadow .15s,background .2s;letter-spacing:.5px}
.btn-again{background:linear-gradient(135deg,#e70012,#8a1717);color:#fff;box-shadow:0 8px 18px rgba(231,0,18,.22)}
.btn-again:hover{background:linear-gradient(135deg,#ff1e28,#b10f18);transform:translateY(-2px);box-shadow:0 12px 22px rgba(231,0,18,.28)}
.btn-close-modal{background:#fff1ed;color:#8a1717;box-shadow:0 2px 8px rgba(35,24,21,.08);border:1px solid #eadbd6}
.btn-close-modal:hover{background:#f8e5df;transform:translateY(-2px)}

/* Exam entry button — appears on completion */
.btn-exam-entry{display:none;position:fixed;bottom:28px;right:28px;z-index:200;padding:14px 32px;background:linear-gradient(135deg,#e70012,#c8102e);color:#fff;font-size:17px;font-weight:900;border:none;border-radius:14px;cursor:pointer;letter-spacing:2px;box-shadow:0 10px 30px rgba(231,0,18,.35);animation:examPulse 1.5s ease-in-out infinite;transition:transform .2s,box-shadow .2s}
.btn-exam-entry:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 16px 38px rgba(231,0,18,.48)}
.btn-exam-entry.show{display:inline-flex;align-items:center;gap:8px}
@keyframes examPulse{0%,100%{box-shadow:0 10px 30px rgba(231,0,18,.35)}50%{box-shadow:0 14px 42px rgba(231,0,18,.6)}}

@media(max-width:820px){
  body{justify-content:flex-start}
  .brand-logo{position:relative;top:auto;left:auto;align-self:flex-start;margin:16px 0 0 16px;width:min(240px,58vw)}
  .page-shell{padding:18px 16px 140px}
  .wheel-section{grid-template-columns:1fr;gap:22px}
  .status-panel{width:min(430px,100%);margin:0 auto}
  .mascot{width:300px;right:8px;bottom:0}
}
@media(max-width:480px){
  .page-header{padding-bottom:16px}
  .wheel-outer{width:min(360px,88vw);height:min(360px,88vw)}
  .btn-spin{width:80px;height:80px;font-size:14px;border-width:5px}
  .status-panel{padding:16px}
  .modal-box{padding:28px 18px 20px}
  .modal-btns{flex-direction:column;align-items:center}
  .modal-btns button{width:100%;max-width:none}
  .mascot{width:240px;right:2px;bottom:0}
}
</style>
</head>
<body>

<img class="brand-logo" src="/brand-logo.png" alt="国民养老保险" />

<main class="page-shell">
  <header class="page-header">
    <h1>企业文化知识转盘</h1>
    <p class="subtitle">7次机会内点亮7项文化内容</p>
  </header>

  <section class="wheel-section">
    <div class="wheel-outer">
      <div class="wheel-pointer"></div>
      <div class="wheel-rotator" id="wheelRotator"></div>
      <div class="btn-spin-wrap">
        <button class="btn-spin" id="btnSpin">开始<br>转动</button>
      </div>
    </div>

    <aside class="status-panel" aria-live="polite">
      <div class="status-top">
        <div>
          <span class="status-label">已点亮</span>
          <span class="status-value"><span id="litCount">0</span>/7</span>
        </div>
        <div class="status-count">剩余 <span id="spinLeft">7</span> 次</div>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-dots" id="progressDots" aria-hidden="true"></div>
      <p class="status-message" id="statusMessage">点击中心按钮开始转动。每次会优先点亮尚未点亮的企业文化板块。</p>
      <div class="lit-list" id="litList"></div>
    </aside>
  </section>
</main>

<div class="mascot" id="mascot" aria-hidden="true">
  <img src="gxb05.png" alt="" />
</div>

<!-- 完成转盘后显示的考试入口按钮 -->
<button class="btn-exam-entry" id="btnExamEntry" onclick="goToExam()">
  <span>📝</span> 马上进入考试 <span>→</span>
</button>

<div class="modal-mask" id="modalMask">
  <div class="modal-box">
    <div class="modal-badge" id="modalBadge"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-divider"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <p class="modal-tip" id="modalTip">多读两遍，牢记本条企业文化</p>
    <div class="modal-btns">
      <button class="btn-again" id="btnAgain">再转一次</button>
      <button class="btn-close-modal" id="btnClose">关 闭</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   ★ 企业文化数据区
============================================================ */
var CULTURES = [
  {
    tag: "使命",
    emoji: "\u2728",
    title: "践行国家发展战略 共筑国民美好生活",
    desc: "顺应国家老龄化战略大势，聚焦多层次、多支柱养老保险体系建设，以专业之力护航百姓养老，以担当之心共筑国民美好生活。"
  },
  {
    tag: "愿景",
    emoji: "\uD83C\uDFD9\uFE0F",
    title: "成为最受信赖的养老金融服务伙伴",
    desc: "信赖靠专业团队、极致服务与稳健经营日积月累铸就，坚守受托初心、践行责任担当，构筑百年长青基业，成为大众最值得托付的养老金融同行伙伴。"
  },
  {
    tag: "价值观",
    emoji: "\uD83D\uDE80",
    title: "创业 \xB7 创新 \xB7 创造",
    desc: "三者环环相扣、层层递进：创业是从0到1的起点；创新是从1到N的驱动力；创造是从N到永恒的价值沉淀，让公司成为养老金融行业的担当与标志。"
  },
  {
    tag: "经营理念",
    emoji: "\u2696\uFE0F",
    title: "客户至上，责任导向 长期主义，严格管理",
    desc: "坚守以客户为中心而非以保单为中心，扛起国企社会责任，恪守长达数十年的资金安全保障承诺，以工匠精神高标准护航公司稳健运营。"
  },
  {
    tag: "发展理念",
    emoji: "\uD83C\uDF31",
    title: "稳中求进，开拓创新 专业专注，普惠为民",
    desc: "在稳健经营基础上积极探索新业态、新模式，走差异化发展之路，聚焦主责主业深耕养老金融，持续降低养老保障参与门槛，用心服务工薪阶层与灵活就业群体。"
  },
  {
    tag: "社会责任",
    emoji: "\u2764\uFE0F",
    title: "社会责任理念：有情怀 有温度 有价值",
    desc: "以情怀为根基主动对标国家战略，以温度为纽带善待员工、关怀客户，以价值为目标坚持长期主义，持续创造经济价值、民生价值与社会价值。"
  },
  {
    tag: "国民作风",
    emoji: "\u26A1",
    title: "国民作风：简单沟通，务实高效",
    desc: "表达简洁准确，干货满满，一针见血，提升执行精度与决策效率，打造信任的基础，提升创新的能力，形成务实高效的国民团队作风。"
  }
];

/* ============================================================
   转盘配色 - 高对比多色板块
============================================================ */
var SLICE_COLORS = [
  "#2563eb",
  "#0f766e",
  "#7c3aed",
  "#f59e0b",
  "#0891b2",
  "#e11d48",
  "#475569"
];
var INACTIVE_COLOR = "#d8e1ea";
var INACTIVE_TEXT_COLOR = "#607086";
var MAX_SPINS = 7;

/* ============================================================
   点亮状态
============================================================ */
var litStatus = [false, false, false, false, false, false, false];

/* ============================================================
   SVG绘制转盘
============================================================ */
var N = CULTURES.length;
var SLICE_DEG = 360 / N;

function buildWheelSVG() {
  var rotator = document.getElementById("wheelRotator");
  var size = 400;
  var cx = size / 2, cy = size / 2, r = size / 2;
  var svgNS = "http://www.w3.org/2000/svg";
  var svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox", "0 0 " + size + " " + size);

  for (var i = 0; i < N; i++) {
    var startDeg = i * SLICE_DEG - 90;
    var endDeg = startDeg + SLICE_DEG;
    var startRad = startDeg * Math.PI / 180;
    var endRad = endDeg * Math.PI / 180;
    var x1 = cx + r * Math.cos(startRad);
    var y1 = cy + r * Math.sin(startRad);
    var x2 = cx + r * Math.cos(endRad);
    var y2 = cy + r * Math.sin(endRad);
    var largeArc = SLICE_DEG > 180 ? 1 : 0;

    /* 扇形 */
    var path = document.createElementNS(svgNS, "path");
    path.setAttribute("id", "slice" + i);
    path.setAttribute("d",
      "M" + cx + "," + cy +
      " L" + x1 + "," + y1 +
      " A" + r + "," + r + " 0 " + largeArc + ",1 " + x2 + "," + y2 +
      " Z");
    path.setAttribute("fill", litStatus[i] ? SLICE_COLORS[i] : INACTIVE_COLOR);
    path.setAttribute("stroke", "rgba(255,255,255,0.55)");
    path.setAttribute("stroke-width", "2.5");
    path.setAttribute("cursor", litStatus[i] ? "pointer" : "default");
    /* 点击已点亮的扇区弹出释义 */
    path.setAttribute("data-idx", i);
    path.addEventListener("click", function(e) {
      var idx = parseInt(this.getAttribute("data-idx"));
      if (litStatus[idx]) {
        e.stopPropagation();
        var item = CULTURES[idx];
        document.getElementById("modalBadge").textContent = item.tag;
        document.getElementById("modalTitle").textContent = item.title;
        document.getElementById("modalDesc").textContent = item.desc;
        document.getElementById("modalMask").classList.add("active");
      }
    });
    svg.appendChild(path);

    /* 扇形中轴方向 */
    var midDeg = startDeg + SLICE_DEG / 2;
    var midRad = midDeg * Math.PI / 180;

    /* emoji图标（外侧） */
    var emojiR = r * 0.82;
    var emojiX = cx + emojiR * Math.cos(midRad);
    var emojiY = cy + emojiR * Math.sin(midRad);
    var emojiText = document.createElementNS(svgNS, "text");
    emojiText.setAttribute("id", "emoji" + i);
    emojiText.setAttribute("x", emojiX);
    emojiText.setAttribute("y", emojiY);
    emojiText.setAttribute("text-anchor", "middle");
    emojiText.setAttribute("dominant-baseline", "middle");
    emojiText.setAttribute("font-size", "24");
    emojiText.setAttribute("pointer-events", "none");
    emojiText.textContent = CULTURES[i].emoji;
    svg.appendChild(emojiText);

    /* 标签名文字（内侧） */
    var labelR = r * 0.55;
    var labelX = cx + labelR * Math.cos(midRad);
    var labelY = cy + labelR * Math.sin(midRad);
    var labelText = document.createElementNS(svgNS, "text");
    labelText.setAttribute("id", "label" + i);
    labelText.setAttribute("x", labelX);
    labelText.setAttribute("y", labelY);
    labelText.setAttribute("text-anchor", "middle");
    labelText.setAttribute("dominant-baseline", "middle");
    labelText.setAttribute("fill", litStatus[i] ? "#ffffff" : INACTIVE_TEXT_COLOR);
    labelText.setAttribute("font-size", "17");
    labelText.setAttribute("font-weight", "900");
    labelText.setAttribute("font-family", "Microsoft YaHei,sans-serif");
    labelText.setAttribute("paint-order", "stroke");
    labelText.setAttribute("stroke", litStatus[i] ? "rgba(20,33,61,0.26)" : "rgba(255,255,255,0.72)");
    labelText.setAttribute("stroke-width", "4");
    labelText.setAttribute("pointer-events", "none");
    labelText.textContent = CULTURES[i].tag;
    svg.appendChild(labelText);
  }

  /* 圆心装饰圈 */
  var oc = document.createElementNS(svgNS, "circle");
  oc.setAttribute("cx", cx); oc.setAttribute("cy", cy); oc.setAttribute("r", "44");
  oc.setAttribute("fill", "rgba(255,255,255,0.18)");
  svg.appendChild(oc);
  var ic = document.createElementNS(svgNS, "circle");
  ic.setAttribute("cx", cx); ic.setAttribute("cy", cy); ic.setAttribute("r", "40");
  ic.setAttribute("fill", "#ffffff");
  svg.appendChild(ic);

  rotator.appendChild(svg);
}

/* ============================================================
   点亮某格扇区
============================================================ */
function lightUpSlice(idx) {
  if (litStatus[idx]) return;
  litStatus[idx] = true;
  var slice = document.getElementById("slice" + idx);
  var label = document.getElementById("label" + idx);
  if (slice) {
    slice.setAttribute("fill", SLICE_COLORS[idx]);
    slice.setAttribute("cursor", "pointer");
  }
  if (label) {
    label.setAttribute("fill", "#ffffff");
    label.setAttribute("stroke", "rgba(20,33,61,0.26)");
  }
  updateStatusUI();
  triggerMascotShine();
  checkExamEntry();
}

function triggerMascotShine() {
  var mascot = document.getElementById("mascot");
  if (!mascot) return;
  mascot.classList.remove("shine");
  void mascot.offsetWidth;
  mascot.classList.add("shine");
}

function countLit() {
  var total = 0;
  for (var i = 0; i < litStatus.length; i++) {
    if (litStatus[i]) total++;
  }
  return total;
}

function isComplete() {
  return countLit() === N;
}

function buildStatusUI() {
  var dots = document.getElementById("progressDots");
  var list = document.getElementById("litList");
  dots.innerHTML = "";
  list.innerHTML = "";
  for (var i = 0; i < N; i++) {
    var dot = document.createElement("span");
    dot.className = "progress-dot";
    dots.appendChild(dot);

    var chip = document.createElement("span");
    chip.className = "lit-chip";
    chip.id = "litChip" + i;
    chip.textContent = CULTURES[i].tag;
    list.appendChild(chip);
  }
  updateStatusUI();
}

function updateStatusUI() {
  var lit = countLit();
  var left = Math.max(MAX_SPINS - spinCount, 0);
  document.getElementById("litCount").textContent = lit;
  document.getElementById("spinLeft").textContent = left;
  document.getElementById("progressFill").style.width = (lit / N * 100) + "%";

  var dots = document.querySelectorAll(".progress-dot");
  for (var i = 0; i < N; i++) {
    dots[i].classList.toggle("active", i < lit);
    var chip = document.getElementById("litChip" + i);
    if (chip) chip.classList.toggle("active", litStatus[i]);
  }

  var message = document.getElementById("statusMessage");
  var btn = document.getElementById("btnSpin");
  if (isComplete()) {
    message.textContent = "7个板块已全部点亮。可以点击已点亮扇区复习释义，或重新开始一轮。";
    btn.innerHTML = "重新<br>开始";
    btn.disabled = false;
  } else if (spinCount >= MAX_SPINS) {
    message.textContent = "本轮次数已用完。点击中心按钮重新开始挑战。";
    btn.innerHTML = "重新<br>开始";
    btn.disabled = false;
  } else {
    message.textContent = "继续转动，每次都会点亮一个尚未出现的板块，7次完成7项点亮。";
    btn.innerHTML = spinCount === 0 ? "开始<br>转动" : "继续<br>转动";
  }
}

function resetGame() {
  litStatus = [false, false, false, false, false, false, false];
  spinCount = 0;
  currentDeg = 0;
  isSpinning = false;
  document.getElementById("wheelRotator").style.transform = "rotate(0deg)";
  document.getElementById("wheelRotator").innerHTML = "";
  buildWheelSVG();
  updateStatusUI();
  checkExamEntry();
}

/* ============================================================
   转盘旋转动画 - 偏向未点亮扇区
============================================================ */
var currentDeg = 0;
var isSpinning = false;
var spinCount = 0;
var pendingResultIndex = null;

/* 计算本次停止的目标角度（偏向未点亮扇区） */
function pickStopAngle() {
  var unlit = [];
  for (var i = 0; i < N; i++) {
    if (!litStatus[i]) unlit.push(i);
  }

  var targetSlice;

  if (unlit.length > 0) {
    targetSlice = unlit[Math.floor(Math.random() * unlit.length)];
  } else {
    targetSlice = Math.floor(Math.random() * N);
  }

  pendingResultIndex = targetSlice;
  var pointerDeg = targetSlice * SLICE_DEG + SLICE_DEG / 2;
  var offset = (Math.random() - 0.5) * SLICE_DEG * 0.42;
  return (360 - pointerDeg + offset + 360) % 360;
}

function startSpin() {
  if (isSpinning) return;
  if (isComplete() || spinCount >= MAX_SPINS) {
    resetGame();
    return;
  }
  isSpinning = true;
  document.getElementById("btnSpin").disabled = true;

  var extraRounds = 5 + Math.floor(Math.random() * 4);
  var stopDeg = pickStopAngle();
  var startDeg = currentDeg;
  var startNorm = ((startDeg % 360) + 360) % 360;
  var travelDeg = (stopDeg - startNorm + 360) % 360;
  var totalDeg = extraRounds * 360 + travelDeg;
  var duration = 3000 + Math.random() * 900;
  var startTime = null;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    var elapsed = timestamp - startTime;
    var progress = Math.min(elapsed / duration, 1);
    currentDeg = startDeg + totalDeg * easeOut(progress);
    document.getElementById("wheelRotator").style.transform = "rotate(" + currentDeg + "deg)";
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      isSpinning = false;
      document.getElementById("btnSpin").disabled = false;
      spinCount++;
      var resultIdx = pendingResultIndex === null ? getResultIndex() : pendingResultIndex;
      pendingResultIndex = null;
      lightUpSlice(resultIdx);
      showResult(resultIdx);
    }
  }
  requestAnimationFrame(animate);
}

/* ============================================================
   计算指针指向哪一格
============================================================ */
function getResultIndex() {
  var normDeg = ((currentDeg % 360) + 360) % 360;
  var pointerDeg = ((360 - normDeg) % 360 + 360) % 360;
  return Math.floor(pointerDeg / SLICE_DEG) % N;
}

/* ============================================================
   弹窗
============================================================ */
function showResult(idx) {
  if (typeof idx !== "number") idx = getResultIndex();
  lightUpSlice(idx);
  var item = CULTURES[idx];
  document.getElementById("modalBadge").textContent = item.tag;
  document.getElementById("modalTitle").textContent = item.title;
  document.getElementById("modalDesc").textContent = item.desc;
  document.getElementById("modalTip").textContent = isComplete()
    ? "恭喜，7个企业文化板块已全部点亮"
    : "多读两遍，牢记本条企业文化";
  document.getElementById("btnAgain").textContent = isComplete() ? "重新开始" : "再转一次";
  document.getElementById("modalMask").classList.add("active");
}
function closeModal() {
  document.getElementById("modalMask").classList.remove("active");
}
function closeModalAndSpin() {
  closeModal();
  if (isComplete() || spinCount >= MAX_SPINS) {
    resetGame();
  } else {
    setTimeout(startSpin, 200);
  }
}

/* 完成转盘后显示考试按钮 */
function checkExamEntry() {
  var btn = document.getElementById('btnExamEntry');
  if (isComplete()) {
    btn.classList.add('show');
  } else {
    btn.classList.remove('show');
  }
}

function goToExam() {
  // Notify parent page (index.html) to start the culture exam
  if (window.parent && window.parent !== window) {
    window.parent.postMessage('startCultureExam', '*');
  }
}

/* ============================================================
   事件绑定
============================================================ */
document.getElementById("btnSpin").addEventListener("click", startSpin);
document.getElementById("btnAgain").addEventListener("click", closeModalAndSpin);
document.getElementById("btnClose").addEventListener("click", closeModal);
document.getElementById("modalMask").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

/* 初始化 */
buildWheelSVG();
buildStatusUI();
</script>
</body>
</html>
