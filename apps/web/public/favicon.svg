<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B5EA7"/>
      <stop offset="100%" stop-color="#1A3D6E"/>
    </linearGradient>
    <!-- Star gold gradient -->
    <linearGradient id="starGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="40%" stop-color="#FFC940"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <!-- Wave gradient -->
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA0E8"/>
      <stop offset="100%" stop-color="#3A7BD5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Compass rose ring (subtle guidance element) -->
  <circle cx="32" cy="28" r="18" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="32" cy="28" r="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>

  <!-- Compass cardinal points — N/S/E/W markers -->
  <line x1="32" y1="10" x2="32" y2="15" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <line x1="32" y1="41" x2="32" y2="46" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <line x1="14" y1="28" x2="19" y2="28" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <line x1="45" y1="28" x2="50" y2="28" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>

  <!-- Diagonal compass ticks -->
  <line x1="19" y1="15" x2="22" y2="18" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <line x1="42" y1="15" x2="45" y2="18" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <line x1="19" y1="41" x2="22" y2="38" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <line x1="42" y1="41" x2="45" y2="38" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>

  <!-- North pointer (triangle — guidance direction) -->
  <polygon points="32,12 29,19 35,19" fill="rgba(255,255,255,0.25)"/>

  <!-- === CENTRAL STAR — the "new employee" (新星) === -->
  <!-- Star glow -->
  <circle cx="32" cy="28" r="14" fill="rgba(255,200,50,0.1)"/>
  <circle cx="32" cy="28" r="9" fill="rgba(255,200,50,0.15)"/>

  <!-- 5-pointed star -->
  <polygon
    points="32,16 36.5,24.5 46,25.5 39,32 41,41.5 32,37 23,41.5 25,32 18,25.5 27.5,24.5"
    fill="url(#starGold)"
    stroke="#E8960A"
    stroke-width="0.5"
    stroke-linejoin="round"
  />

  <!-- Star inner highlight -->
  <polygon
    points="32,19 35.5,25 42,25.5 37,30 38.5,36.5 32,33 25.5,36.5 27,30 22,25.5 28.5,25"
    fill="rgba(255,255,255,0.25)"
  />

  <!-- === SPROUT at star's base — "growth" (成长) === -->
  <path d="M28 38 Q30 32 29 28" stroke="#6DD8AD" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M29 30 Q34 30 33 33 Q31 35 29 34" fill="#6DD8AD" opacity="0.7"/>
  <path d="M29 30 Q25 29 26 33 Q28 35 29 34" fill="#5CC09A" opacity="0.6"/>

  <!-- === WAVES at bottom — the "voyage" (航行) === -->
  <path d="M0 46 Q6 42 12 46 Q18 50 24 46 Q30 42 36 46 Q42 50 48 46 Q54 42 60 46 Q64 49 64 50 L64 64 L0 64 Z" fill="url(#waveGrad)" opacity="0.85"/>

  <!-- Second wave layer -->
  <path d="M0 51 Q10 47 20 51 Q30 55 40 51 Q50 47 60 51 L64 51 L64 64 L0 64 Z" fill="#2560A0" opacity="0.5"/>

  <!-- Welcome arc / embracing curve above star -->
  <path d="M18 20 Q32 8 46 20" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
