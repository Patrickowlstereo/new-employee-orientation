spring:
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/orientation}
    username: ${DB_USER:orientation_app}
    password: ${DB_PASSWORD:orientation_dev_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-make-it-long-enough-32bytes}
    expiration-hours: 8
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
  static:
    web-dir: ${WEB_DIR:./dist/web}
    admin-dir: ${ADMIN_DIR:./dist/admin}

server:
  port: 8080
