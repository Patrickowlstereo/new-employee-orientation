spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/orientation}
    username: ${DB_USER:orientation_app}
    password: ${DB_PASSWORD:orientation_dev_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# JWT 密钥无默认值:缺失或不足 32 字节时启动即失败(JwtService 校验),
# 本地开发在 application-local.yml 中配置,生产通过环境变量 JWT_SECRET 注入。
app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-hours: 8
  uploads:
    dir: ${UPLOADS_DIR:./uploads}
  static:
    web-dir: ${WEB_DIR:./dist/web}
    admin-dir: ${ADMIN_DIR:./dist/admin}

# Swagger/OpenAPI 默认关闭,本地开发在 application-local.yml 开启,
# 其他环境确有需要时通过 SWAGGER_ENABLED=true 显式打开。
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

# 日志:滚动文件见 logback-spring.xml(按天轮转 + 100MB/文件 + 保留 30 天)
logging:
  file:
    path: ${LOG_DIR:./logs}

server:
  port: 8080
